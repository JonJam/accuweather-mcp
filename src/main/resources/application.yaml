spring:
  application:
    name: weathermcp
  ai:
    mcp:
      server:
        name: weathermcp
        version: ${APP_VERSION:0.0.1-SNAPSHOT}
        type: SYNC
        stdio: true
  http:
    serviceclient:
      accuweather:
        base-url: https://dataservice.accuweather.com
        default-header:
          Accept-Encoding: gzip,deflate
          Authorization: Bearer ${ACCUWEATHER_API_KEY}